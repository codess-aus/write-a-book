name: Deploy OAuth Server to Azure App Service

on:
  push:
    branches:
      - main
    paths:
      - 'book-outline-wizard/oauth-server/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: book-outline-wizard/oauth-server

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: book-outline-wizard/oauth-server/package-lock.json

      - name: Install dependencies
        run: npm ci --omit=dev

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: book-outline-wizard/oauth-server
